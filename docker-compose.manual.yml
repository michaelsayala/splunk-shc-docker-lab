# -------------------------------
# Common Environment Variables
# -------------------------------
x-splunk-env: &splunk-env
  SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
  SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
  SPLUNK_START_ARGS: "--accept-license"

# -------------------------------
# Common Service Configuration
# -------------------------------
x-splunk-common: &splunk-common
  image: splunk/splunk:9.0.3-openjdk11
  restart: unless-stopped
  networks:
    - skynet
  tty: true
  stdin_open: true

services:
  # -------------------------------
  # Search Head Cluster
  # -------------------------------
  sh1:
    <<: *splunk-common
    hostname: sh1
    ports:
      - "8001:8000"
    environment:
      <<: *splunk-env
    volumes:
      - sh1_etc:/opt/splunk/etc
      - sh1_var:/opt/splunk/var

  sh2:
    <<: *splunk-common
    hostname: sh2
    ports:
      - "8002:8000"
    environment:
      <<: *splunk-env
    volumes:
      - sh2_etc:/opt/splunk/etc
      - sh2_var:/opt/splunk/var

  sh3:
    <<: *splunk-common
    hostname: sh3
    ports:
      - "8003:8000"
    environment:
      <<: *splunk-env
    volumes:
      - sh3_etc:/opt/splunk/etc
      - sh3_var:/opt/splunk/var

  # -------------------------------
  # Deployer
  # -------------------------------
  dep1:
    <<: *splunk-common
    hostname: dep1
    ports:
      - "8004:8000"
    environment:
      <<: *splunk-env
    volumes:
      - dep1_etc:/opt/splunk/etc
      - dep1_var:/opt/splunk/var

# -------------------------------
# Networks
# -------------------------------
networks:
  skynet:
    driver: bridge

# -------------------------------
# Volumes
# -------------------------------
volumes:
  sh1_etc:
  sh1_var:
  sh2_etc:
  sh2_var:
  sh3_etc:
  sh3_var:
  dep1_etc:
  dep1_var:
